- title: "Algorithmic Underwriting in High Risk Mortgage Markets"
  pdflink: "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4602411"
  book: "Journal of Finance, Forthcoming"
  coauthors: "Janet Gao and Livia Yi"
  abstract: >
        We study the effects of a policy that increased lenders’ reliance on algorithmic underwriting for low-credit-score, high-leverage mortgages. The policy led to a substantial credit expansion with little change in default risk among approved borrowers, suggesting that algorithms perform effective credit screening. The effectiveness of algorithmic underwriting arises from alleviated regulatory concerns by lenders, reduced information frictions in financial intermediation, and a greater reliance on standardized data. The policy also enabled low-credit-score borrowers to move to higher-quality neighborhoods. However, the credit expansion was weaker for Black and lower-income borrowers, which highlights algorithms' limitation in promoting financial inclusion for disadvantaged populations.

- title: "Alumni Relationships and Judicial Bias"
  pdflink: "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=3711873"
  coauthors: "Tianwang Liu"
  book: "Economic Inquiry, Forthcoming"
  abstract: >
    We examine whether law school alumni relationships between lawyers and judges are correlated with case outcomes. We show that, in the context of medical malpractice lawsuits filed in Florida, having a plaintiff’s attorney who attended the same law school as a randomly assigned judge increases the chances of recovery by about 2 percentage points. We further show that the effect is more pronounced between lawyers and judges with a larger age gap, consistent with an age-dependent effect. Our results suggest that case outcomes can be biased when lawyers and judges are part of the same affinity group.

- title: "Mortgage Prepayment, Race, and Monetary Policy"
  pdflink: "https://www.sciencedirect.com/science/article/abs/pii/S0304405X22002458"
  book: "Journal of Financial Economics, March 2023"
  coauthors: "Kristopher Gerardi and Paul Willen"
  abstract: >
    Over the period 2005 to 2015, Black borrowers paid more than 40 basis points higher mortgage interest rates than Non-Hispanic white borrowers. We show that the main reason is that Non-Hispanic white borrowers are much more likely to exploit periods of falling interest rates by refinancing their mortgages or moving. Black and Hispanic white borrowers face challenges refinancing because, on average, they have lower credit scores, equity and income. But even holding those factors constant, Blacks and Hispanic white borrowers refinance less suggesting that other social factors are at play. Because they are more likely to exploit lower interest rates, white borrowers benefit more from monetary expansions. Policies that reduce barriers to refinancing for minority borrowers and alternative mortgage contract designs can significantly reduce racial mortgage rate inequality.
  footnote: "Editor's Choice, March 2023. Jensen Prize (First Place), 2024."
